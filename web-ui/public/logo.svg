<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Blue glow gradient for the arrow -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <!-- Cyan accent for C++ text -->
    <linearGradient id="cppGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
    <!-- Yellow accent for Python text -->
    <linearGradient id="pyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect width="32" height="32" rx="7" ry="7" fill="none" stroke="#1e40af" stroke-width="0.8" opacity="0.6"/>

  <!-- C++ label (top-left) -->
  <text x="3" y="12"
    font-family="'JetBrains Mono', 'Fira Code', monospace"
    font-size="7"
    font-weight="700"
    fill="url(#cppGrad)"
    filter="url(#glow)"
    letter-spacing="-0.3">C++</text>

  <!-- Arrow in center — the key visual element -->
  <!-- Arrow shaft -->
  <line x1="4" y1="18" x2="22" y2="18"
    stroke="url(#arrowGrad)"
    stroke-width="2"
    stroke-linecap="round"
    filter="url(#softglow)"/>
  <!-- Arrow head -->
  <polyline points="18,14 23,18 18,22"
    fill="none"
    stroke="url(#arrowGrad)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softglow)"/>

  <!-- Decorative dot accent (like a code cursor) -->
  <circle cx="27" cy="18" r="1.5" fill="#3b82f6" opacity="0.7"/>

  <!-- py label (bottom-right) -->
  <text x="18" y="29"
    font-family="'JetBrains Mono', 'Fira Code', monospace"
    font-size="7"
    font-weight="700"
    fill="url(#pyGrad)"
    filter="url(#glow)"
    letter-spacing="-0.3">.py</text>
</svg>
